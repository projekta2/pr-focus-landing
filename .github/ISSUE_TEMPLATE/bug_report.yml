name: 🐛 Bug Report
description: Report a bug to help us improve.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the extension popup.
        2. Click on a PR.
        3. The AI summary doesn't load.
    validations:
      required: true
  - type: input
    attributes:
      label: Chrome Version
      description: Found under chrome://settings/help
  - type: input
    attributes:
      label: Extension Version
      description: Found in the extension popup settings.
  - type: textarea
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
