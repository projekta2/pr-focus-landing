name: ✨ Feature Request
description: Suggest an idea for this project.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Is your feature request related to a problem?
      description: Please describe the problem you're facing.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: What should the feature do?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives you've considered
  - type: textarea
    attributes:
      label: Additional context
      description: Any screenshots, links, or references.
